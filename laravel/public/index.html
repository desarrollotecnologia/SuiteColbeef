<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workbeef - Cargando</title>
    <link rel="preload" href="./css/style.css" as="style" />
    <link rel="preload" href="./img/pantallaCarga/fondoIPHONE.jpg" as="image" />
    <link rel="prefetch" href="./site.html" />
    <link rel="prefetch" href="./css/site.css" as="style" />
    <link rel="prefetch" href="./img/site/fondoSite-hero.jpg" as="image" type="image/jpeg" />
    <link rel="prefetch" href="./img/site/fondoSite-900.webp" as="image" type="image/webp" />
    <link rel="prefetch" href="./img/site/fondoSite-1200.webp" as="image" type="image/webp" />
    <link rel="prefetch" href="./img/site/fondoSite-1600.webp" as="image" type="image/webp" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="screen" role="presentation" data-next-url="./site.html">
      <!-- Capa 1: Fondo (una imagen según viewport; menos peso al inicio) -->
      <img class="bgImg bgImg--pc" src="img/pantallaCarga/fondoPC.jpg" alt="" draggable="false" fetchpriority="low" />
      <img class="bgImg bgImg--phone" src="img/pantallaCarga/fondoIPHONE.jpg" alt="" draggable="false" fetchpriority="high" />

      <!-- Capa 2: Cielo -->
      <div class="cielo" aria-hidden="true">
        <img class="sun" src="img/pantallaCarga/SolSonriente.png" alt="" draggable="false" loading="lazy" />

        <img class="cloud cloud--1" src="img/pantallaCarga/1nube.png" alt="" draggable="false" loading="lazy" />
        <img class="cloud cloud--2" src="img/pantallaCarga/2nube.png" alt="" draggable="false" loading="lazy" />
        <img class="cloud cloud--3" src="img/pantallaCarga/3nube.png" alt="" draggable="false" loading="lazy" />
      </div>

      <!-- Capa 3: Marca Workbeef (letras en orden) + chuleta -->
      <div class="centerStage" aria-hidden="true">
        <img class="steak" src="img/pantallaCarga/chuleta.png" alt="" draggable="false" loading="eager" />

        <div class="word word--workbeef" aria-label="Workbeef">
          <span class="letterChar letterChar--work" style="--i: 0">W</span>
          <span class="letterChar letterChar--work" style="--i: 1">o</span>
          <span class="letterChar letterChar--work" style="--i: 2">r</span>
          <span class="letterChar letterChar--work" style="--i: 3">k</span>
          <span class="letterChar letterChar--beef" style="--i: 4">b</span>
          <span class="letterChar letterChar--beef" style="--i: 5">e</span>
          <span class="letterChar letterChar--beef" style="--i: 6">e</span>
          <span class="letterChar letterChar--beef" style="--i: 7">f</span>
        </div>
      </div>

      <!-- Capa 4: UI (oculta en CSS; script puede usar si la muestras) -->
      <div class="uiTop">
        <div class="status" id="statusText" aria-live="polite">Cargando...</div>

        <div class="loader" aria-label="Barra de progreso">
          <div class="loaderTrack" aria-hidden="true">
            <div class="loaderFill" id="loaderFill"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="./script/script.js" defer></script>
  </body>
</html>
